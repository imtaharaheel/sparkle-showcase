name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set Vite base path
        id: vite_base
        run: |
          if [ -n "${{ vars.VITE_BASE }}" ]; then
            echo "base=${{ vars.VITE_BASE }}" >> $GITHUB_OUTPUT
          elif [ -f .github/pages-custom-domain-root ]; then
            echo "base=/" >> $GITHUB_OUTPUT
          else
            echo "base=/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE: ${{ steps.vite_base.outputs.base }}

      - name: Verify production build
        run: |
          test -f dist/index.html
          grep -q '/assets/' dist/index.html || (echo "ERROR: dist/index.html has no bundled JS" && exit 1)
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "ERROR: dist/index.html still points at dev source (src/main.tsx)"
            exit 1
          fi
          echo "Build OK — bundled assets present"

      - name: SPA fallback (GitHub Pages has no server rewrites)
        run: cp dist/index.html dist/404.html

      - name: Ensure Jekyll is disabled and custom domain file exists
        run: |
          cp public/.nojekyll dist/.nojekyll 2>/dev/null || touch dist/.nojekyll
          cp public/CNAME dist/CNAME 2>/dev/null || true

      - name: Sync built site into docs/ for GitHub Pages
        run: |
          rm -rf docs
          mkdir -p docs
          cp -a dist/. docs/

      - name: Commit and push docs/ to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "docs/ unchanged — nothing to publish"
            exit 0
          fi
          git commit -m "Deploy production site to docs/ [skip ci]"
          git push

      - name: Point GitHub Pages at main/docs (production build)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${{ github.repository }}/pages"
          BODY='{"build_type":"legacy","source":{"branch":"main","path":"/docs"}}'

          http_code() { printf '%s' "$1" | tail -n1; }
          http_body() { printf '%s' "$1" | sed '$d'; }

          request() {
            curl -sS -X "$1" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d "$2" \
              -w "\n%{http_code}" \
              "$3"
          }

          echo "Setting GitHub Pages source to main branch /docs ..."
          RESP=$(request PUT "$BODY" "$API")
          CODE=$(http_code "$RESP")
          echo "PUT /pages -> HTTP ${CODE}"
          http_body "$RESP" || true

          if [ "$CODE" = "200" ] || [ "$CODE" = "204" ]; then
            echo "GitHub Pages now serves the built site from main/docs."
            exit 0
          fi

          if [ "$CODE" = "404" ]; then
            echo "Creating GitHub Pages site with main/docs source..."
            RESP=$(request POST "$BODY" "$API")
            CODE=$(http_code "$RESP")
            echo "POST /pages -> HTTP ${CODE}"
            http_body "$RESP" || true
            if [ "$CODE" = "201" ] || [ "$CODE" = "200" ]; then
              exit 0
            fi
          fi

          if [ "$CODE" = "409" ]; then
            echo "Pages source already configured — continuing."
            exit 0
          fi

          echo "WARNING: Could not auto-switch Pages to main/docs (HTTP ${CODE})."
          echo "If the live site is still broken, set Settings -> Pages -> Branch main, folder /docs."
