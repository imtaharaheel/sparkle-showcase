name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  administration: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_mode: ${{ steps.pages_config.outputs.mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set Vite base path
        id: vite_base
        run: |
          if [ -n "${{ vars.VITE_BASE }}" ]; then
            echo "base=${{ vars.VITE_BASE }}" >> $GITHUB_OUTPUT
          elif [ -f .github/pages-custom-domain-root ]; then
            echo "base=/" >> $GITHUB_OUTPUT
          else
            echo "base=/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE: ${{ steps.vite_base.outputs.base }}

      - name: Verify production build
        run: |
          test -f dist/index.html
          grep -q '/assets/' dist/index.html || (echo "ERROR: dist/index.html has no bundled JS" && exit 1)
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "ERROR: dist/index.html still points at dev source (src/main.tsx)"
            exit 1
          fi
          echo "Build OK — bundled assets present"

      - name: SPA fallback (GitHub Pages has no server rewrites)
        run: cp dist/index.html dist/404.html

      - name: Ensure Jekyll is disabled and custom domain file exists
        run: |
          cp public/.nojekyll dist/.nojekyll 2>/dev/null || touch dist/.nojekyll
          cp public/CNAME dist/CNAME 2>/dev/null || true

      - name: Publish built site to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          single-commit: true

      - name: Configure GitHub Pages source
        id: pages_config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          API="https://api.github.com/repos/${REPO}/pages"
          AUTH=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")

          http_code() { printf '%s' "$1" | tail -n1; }
          http_body() { printf '%s' "$1" | sed '$d'; }

          request() {
            curl -sS -X "$1" "${AUTH[@]}" -H "Content-Type: application/json" -d "$2" -w "\n%{http_code}" "$3"
          }

          try_legacy() {
            local BODY='{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'
            echo "Trying gh-pages branch as Pages source..."
            local RESP
            RESP=$(request PUT "$BODY" "$API")
            local CODE
            CODE=$(http_code "$RESP")
            echo "PUT /pages (legacy gh-pages) -> HTTP ${CODE}"
            http_body "$RESP" || true

            if [ "$CODE" = "200" ] || [ "$CODE" = "204" ]; then
              echo "mode=legacy" >> "$GITHUB_OUTPUT"
              return 0
            fi

            if [ "$CODE" = "404" ]; then
              echo "Pages site not found; creating with gh-pages source..."
              RESP=$(request POST "$BODY" "$API")
              CODE=$(http_code "$RESP")
              echo "POST /pages (legacy gh-pages) -> HTTP ${CODE}"
              http_body "$RESP" || true
              if [ "$CODE" = "201" ] || [ "$CODE" = "200" ]; then
                echo "mode=legacy" >> "$GITHUB_OUTPUT"
                return 0
              fi
            fi
            return 1
          }

          try_workflow() {
            local BODY='{"build_type":"workflow"}'
            echo "Trying GitHub Actions as Pages source..."
            local RESP
            RESP=$(request PUT "$BODY" "$API")
            local CODE
            CODE=$(http_code "$RESP")
            echo "PUT /pages (workflow) -> HTTP ${CODE}"
            http_body "$RESP" || true

            if [ "$CODE" = "200" ] || [ "$CODE" = "204" ]; then
              echo "mode=workflow" >> "$GITHUB_OUTPUT"
              return 0
            fi

            if [ "$CODE" = "404" ]; then
              local CREATE='{"build_type":"workflow","source":{"branch":"main","path":"/"}}'
              RESP=$(request POST "$CREATE" "$API")
              CODE=$(http_code "$RESP")
              echo "POST /pages (workflow) -> HTTP ${CODE}"
              http_body "$RESP" || true
              if [ "$CODE" = "201" ] || [ "$CODE" = "200" ]; then
                echo "mode=workflow" >> "$GITHUB_OUTPUT"
                return 0
              fi
            fi
            return 1
          }

          if try_legacy; then
            echo "GitHub Pages will serve the built site from gh-pages."
            exit 0
          fi

          if try_workflow; then
            echo "GitHub Pages will deploy via GitHub Actions."
            exit 0
          fi

          echo "ERROR: Could not configure GitHub Pages automatically."
          echo "Set repo Settings -> Pages -> Source to branch gh-pages (root), then re-run this workflow."
          exit 1

      - name: Setup Pages
        if: steps.pages_config.outputs.mode == 'workflow'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: steps.pages_config.outputs.mode == 'workflow'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    needs: build
    if: needs.build.outputs.pages_mode == 'workflow'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
