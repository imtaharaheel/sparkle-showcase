name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set Vite base path
        id: vite_base
        run: |
          if [ -n "${{ vars.VITE_BASE }}" ]; then
            echo "base=${{ vars.VITE_BASE }}" >> $GITHUB_OUTPUT
          elif [ -f .github/pages-custom-domain-root ]; then
            echo "base=/" >> $GITHUB_OUTPUT
          else
            echo "base=/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE: ${{ steps.vite_base.outputs.base }}

      - name: Verify production build
        run: |
          test -f dist/index.html
          grep -q '/assets/' dist/index.html || (echo "ERROR: dist/index.html has no bundled JS" && exit 1)
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "ERROR: dist/index.html still points at dev source (src/main.tsx)"
            exit 1
          fi
          echo "Build OK — bundled assets present"

      - name: SPA fallback (GitHub Pages has no server rewrites)
        run: cp dist/index.html dist/404.html

      - name: Ensure Jekyll is disabled and custom domain file exists
        run: |
          cp public/.nojekyll dist/.nojekyll 2>/dev/null || touch dist/.nojekyll
          cp public/CNAME dist/CNAME 2>/dev/null || true

      - name: Publish built site to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          single-commit: true

      - name: Ensure GitHub Pages serves gh-pages branch
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="https://api.github.com/repos/${{ github.repository }}/pages"
          AUTH=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")
          BODY='{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'
          CODE=$(curl -sS -o /tmp/pages-put.json -w "%{http_code}" -X PUT "${AUTH[@]}" -H "Content-Type: application/json" -d "$BODY" "$API")
          echo "Pages source update HTTP ${CODE}"
          cat /tmp/pages-put.json || true

      - name: Trigger GitHub Pages rebuild
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
          echo "Pages rebuild requested"
