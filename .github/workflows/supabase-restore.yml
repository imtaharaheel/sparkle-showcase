# Restores a paused Supabase project and configures auth redirect URLs.
# Secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF
name: Restore Supabase

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Restore Supabase project if paused
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}"
          AUTH=(-H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json")

          STATUS=$(curl -sS "${AUTH[@]}" "$API" | jq -r '.status // "unknown"')
          echo "Project status: ${STATUS}"

          if [ "$STATUS" = "INACTIVE" ] || [ "$STATUS" = "PAUSED" ]; then
            echo "Restoring paused Supabase project..."
            curl -sS -X POST "${AUTH[@]}" "${API}/restore"
          fi

          for attempt in $(seq 1 36); do
            STATUS=$(curl -sS "${AUTH[@]}" "$API" | jq -r '.status // "unknown"')
            HEALTH=$(curl -sS -o /dev/null -w "%{http_code}" "https://${SUPABASE_PROJECT_REF}.supabase.co/auth/v1/health" || true)
            echo "Attempt ${attempt}: status=${STATUS}, auth_health=${HEALTH}"
            if [ "$HEALTH" = "200" ] || [ "$HEALTH" = "204" ] || [ "$HEALTH" = "401" ]; then
              echo "Supabase auth is reachable."
              break
            fi
            if [ "$attempt" -eq 36 ]; then
              echo "ERROR: Supabase auth still not healthy after waiting."
              exit 1
            fi
            sleep 10
          done

      - name: Configure auth URLs for password reset
        run: |
          curl -sS -X PATCH \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/config/auth" \
            -d '{
              "site_url": "https://saimenterprise.com",
              "uri_allow_list": "https://saimenterprise.com/admin/reset-password,http://localhost:8080/admin/reset-password"
            }'
          echo "Auth redirect URLs configured."
